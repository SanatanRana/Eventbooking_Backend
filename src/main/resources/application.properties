spring.application.name=ranadj

# Database Configuration with multi-fallback (supports uppercase, lowercase, and default hardcoded values)
spring.datasource.url=${DB_URL:${dburl:jdbc:mysql://localhost:3306/eventbooking}}
spring.datasource.username=${DB_NAME:${dbname:local_user}}
spring.datasource.password=${DB_PASSWORD:${dbpassword:local_password}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

jwt.secret=ranadjverysecuresecretkeyforjwtgeneration
jwt.expiration=86400000

# Razorpay Configuration Keys (Test Credentials with fallbacks)
razorpay.key.id=${Razkeyid:rzp_test_RanaDJFakeKey123}
razorpay.key.secret=${Razkeysecret:RanaDJFakeSecretKey456}

# Azure Blob Storage Configuration (supports both AZURE_STORAGE_CONNECTION_STRING and lowercase containerstring)
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:${containerstring:}}
azure.storage.container-name=${AZURE_STORAGE_CONTAINER_NAME:${containename:ranadjcontainer}}

# File Upload Size Limits
spring.servlet.multipart.max-file-size=250MB
spring.servlet.multipart.max-request-size=250MB

