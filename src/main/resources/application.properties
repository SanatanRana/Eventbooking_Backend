spring.application.name=ranadj

# Database Configuration with smart fallbacks (falls back to hardcoded Azure MySQL if env vars are missing)
spring.datasource.url=${dburl:jdbc:mysql://my-sqldb-server.mysql.database.azure.com:3306/eventbooking?useSSL=true&requireSSL=true}
spring.datasource.username=${dbname:mysqldb}
spring.datasource.password=${dbpassword:Mysqldb@123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

jwt.secret=ranadjverysecuresecretkeyforjwtgeneration
jwt.expiration=86400000

# Razorpay Configuration Keys (Test Credentials with fallbacks)
razorpay.key.id=${Razkeyid:rzp_test_RanaDJFakeKey123}
razorpay.key.secret=${Razkeysecret:RanaDJFakeSecretKey456}

# Azure Blob Storage Configuration (with empty string fallbacks so app boots even if not configured yet)
azure.storage.connection-string=${containerstring:}
azure.storage.container-name=${containername:ranadjcontainer}

# File Upload Size Limits
spring.servlet.multipart.max-file-size=250MB
spring.servlet.multipart.max-request-size=250MB

